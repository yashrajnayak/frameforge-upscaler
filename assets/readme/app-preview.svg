  <text x="48" y="180" font-family="Inter, Arial, sans-serif" font-size="13" fill="#667085">Choose a clip, preview, export.</text>
  <rect x="48" y="206" width="256" height="138" rx="8" fill="#F8FBFC" stroke="#A9BDCA" stroke-dasharray="7 7"/>
  <rect x="154" y="238" width="44" height="44" rx="8" fill="#E6F8FB"/>
