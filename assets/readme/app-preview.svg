  <text x="94" y="59" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#111827">FrameForge</text>
  <rect x="1236" y="36" width="112" height="32" rx="8" fill="#EFFAF4" stroke="#BFE5D1"/>
