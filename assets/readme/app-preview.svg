<svg width="1440" height="840" viewBox="0 0 1440 840" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">FrameForge app preview</title>
  <desc id="desc">A minimal local browser video upscaler interface with source controls, a before and after preview, and export progress.</desc>
